level@io.netty = info
level@software.amazon = info
level@dev.langchain4j = debug

# Write log entries on tinylog's dedicated writer thread instead of the calling thread. This keeps logging off the
# streaming pipeline's threads (the SDK's Netty event loop), so BedrockNonBlockingIT (BlockHound) does not flag
# synchronous console writes as blocking I/O when logRequests/logResponses are enabled. The actual write happens on
# tinylog's writer thread, which is not in the policed non-blocking set.
writingthread = true
