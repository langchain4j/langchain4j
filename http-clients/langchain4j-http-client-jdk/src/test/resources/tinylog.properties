# Write log entries on tinylog's dedicated writer thread instead of the calling thread. This keeps
# logging off the streaming pipeline's worker threads, so JdkHttpClientNonBlockingIT (BlockHound) does
# not flag synchronous console writes as blocking I/O when logging is enabled. The actual write happens
# on tinylog's writer thread, which is not in the policed non-blocking set.
writingthread = true

# Enable DEBUG for the HTTP-client logging package so LoggingHttpClient's per-event logging actually
# fires (otherwise the logging path would be a no-op and the logging=true case wouldn't test anything).
level@dev.langchain4j.http.client.log = debug
