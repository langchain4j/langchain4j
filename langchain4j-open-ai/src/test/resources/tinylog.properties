level@io.ktor = warn

# Write log entries on tinylog's dedicated writer thread instead of the calling thread. This keeps
# logging off the streaming pipeline's threads, so OpenAiStreamingChatModelNonBlockingIT (BlockHound)
# does not flag synchronous console writes as blocking I/O when logRequests/logResponses are enabled.
# The actual write happens on tinylog's writer thread, which is not in the policed non-blocking set.
writingthread = true
